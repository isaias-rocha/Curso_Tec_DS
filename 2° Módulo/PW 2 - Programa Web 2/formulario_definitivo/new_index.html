<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/">
    <link rel="stylesheet" href="css/">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Sistema de Cadastro e Consulta - Talentos</title>
</head>

<body>

    <head>
        <ul>home</ul>
        <ul>cadsatro</ul>
        <ul>consulta</ul>
        <ul>sobre</ul>
    </head>


    <main>
        <div class="container">
            <div class="main-container">

                <!-- SEÇÃO DE CADASTRO (EM CIMA) -->
                <div class="card-custom">
                    <h2>Ficha Cadastral</h2>
                    <p class="instrucoes">Preencha os campos abaixo para entrar em nosso banco de talentos.</p>

                    <form action="process.php" method="post" id="formCadastro">
                        <div class="mb-3">
                            <label class="form-label">Nome Completo</label>
                            <input type="text" name="nome" id="nomeDigitado" class="form-control"
                                placeholder="Seu nome">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">E-mail</label>
                            <input type="email" name="email" id="emailDigitado" class="form-control"
                                placeholder="exemplo@dominio.com">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Senha</label>
                            <input type="password" name="senha" id="senhaDigitado" class="form-control" placeholder="">

                            <div class="mb-3">
                                <label class="form-label">Telefone</label>
                                <input type="number" name="telefone" id="telefoneDigitado" class="form-control"
                                    placeholder="00 0000-0000">
                                    
                                <div class="mb-3">
                                    <label class="form-label">CPF</label>
                                    <input type="number" name="cpf" id="cpfDigitado" class="form-control"
                                        placeholder="000.000.000-00">
                                    <button type="submit" class="btn btn-primary"></button>
                                </div>
                            </div>
                    </form>
                </div>
            </div>
        </div>
    </main>


    <footer>

    </footer>
</body>

</html>
