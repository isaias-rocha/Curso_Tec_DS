<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/fomulario.css">
    <style>
        body {
            height: auto;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 6px;
            text-align: left;
        }

        .link-nav {
            font-size: 14px;
            color: #64748b;
            margin-top: 20px;
            margin-bottom: 0;
        }

        .link-nav a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
        }

        .link-nav a:hover {
            text-decoration: underline;
        }

        .feedback {
            display: none;
            margin-top: 16px;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 14px;
            text-align: left;
        }

        .feedback.sucesso {
            background-color: #d1fae5;
            color: #065f46;
        }

        .feedback.erro {
            background-color: #fee2e2;
            color: #991b1b;
        }

        .icone { margin-right: 6px; }
    </style>
</head>
<body>

<div class="contorno">
    <h1>Bem-vindo de volta</h1>
    <p>Entre com suas credenciais para acessar o sistema.</p>

    <form id="formLogin">
        <label for="emailLogin">E-mail</label>
        <input type="email" id="emailLogin" name="email" placeholder="exemplo@email.com">

        <label for="senhaLogin">Senha</label>
        <input type="password" id="senhaLogin" name="senha" placeholder="Sua senha">

        <button type="submit" id="btnLogin">Entrar</button>
    </form>

    <div id="feedbackLogin" class="feedback"></div>

    <p class="link-nav">Não tem uma conta? <a href="cadastro-login.html">Cadastre-se</a></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('emailLogin').focus();

    const form     = document.getElementById('formLogin');
    const btn      = document.getElementById('btnLogin');
    const feedback = document.getElementById('feedbackLogin');

    function validarCampos() {
        const email = document.getElementById('emailLogin');
        const senha = document.getElementById('senhaLogin');

        [email, senha].forEach(el => el.style.boxShadow = '');

        if (email.value.trim() === '') {
            email.style.boxShadow = '0 0 5px #ffc107';
            email.focus();
            return 'Por favor, preencha o campo de e-mail.';
        }
        if (senha.value.trim() === '') {
            senha.style.boxShadow = '0 0 5px #ffc107';
            senha.focus();
            return 'Por favor, preencha o campo de senha.';
        }
        return null;
    }

    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        feedback.style.display = 'none';

        const erroLocal = validarCampos();
        if (erroLocal) {
            feedback.className = 'feedback erro';
            feedback.innerHTML = '<span class="icone">⚠️</span>' + erroLocal;
            feedback.style.display = 'block';
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Entrando…';

        try {
            const resposta = await fetch('autenticar.php', {
                method: 'POST',
                body: new FormData(form)
            });

            const json = await resposta.json();

            if (json.sucesso) {
                feedback.className = 'feedback sucesso';
                feedback.innerHTML =
                    '<span class="icone">✅</span>' +
                    '<strong>' + json.mensagem + '</strong>' +
                    '<br><small>Olá, <strong>' + json.usuario.nome + '</strong>!</small>';
                form.reset();
            } else {
                const erros = json.erros
                    ? json.erros.map(e => '<li>' + e + '</li>').join('')
                    : '<li>' + (json.erro || 'Erro desconhecido.') + '</li>';
                feedback.className = 'feedback erro';
                feedback.innerHTML =
                    '<span class="icone">❌</span>' +
                    '<strong>Não foi possível entrar:</strong>' +
                    '<ul style="margin:0.4rem 0 0 1rem;padding:0">' + erros + '</ul>';
            }

        } catch (_) {
            feedback.className = 'feedback erro';
            feedback.innerHTML = '<span class="icone">⚠️</span>Falha na comunicação com o servidor.';
        } finally {
            feedback.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Entrar';
        }
    });
</script>

</body>
</html>
