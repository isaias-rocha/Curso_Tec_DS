<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/fomulario.css">
    <style>
        body {
            height: auto;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .contorno {
            max-width: 440px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 6px;
            text-align: left;
        }

        .link-nav {
            font-size: 14px;
            color: #64748b;
            margin-top: 20px;
            margin-bottom: 0;
        }

        .link-nav a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
        }

        .link-nav a:hover {
            text-decoration: underline;
        }

        .feedback {
            display: none;
            margin-top: 16px;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 14px;
            text-align: left;
        }

        .feedback.sucesso {
            background-color: #d1fae5;
            color: #065f46;
        }

        .feedback.erro {
            background-color: #fee2e2;
            color: #991b1b;
        }

        .icone { margin-right: 6px; }

        .hint {
            font-size: 12px;
            color: #94a3b8;
            text-align: left;
            margin-top: -14px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="contorno">
    <h1>Criar conta</h1>
    <p>Preencha os dados abaixo para se cadastrar no sistema.</p>

    <form id="formCadastroLogin">
        <label for="nomeDigitado">Nome Completo</label>
        <input type="text" id="nomeDigitado" name="nome" placeholder="Seu nome completo">

        <label for="emailDigitado">E-mail</label>
        <input type="email" id="emailDigitado" name="email" placeholder="exemplo@email.com">

        <label for="senhaDigitada">Senha</label>
        <input type="password" id="senhaDigitada" name="senha" placeholder="Mínimo 6 caracteres">
        <p class="hint">A senha deve ter pelo menos 6 caracteres.</p>

        <label for="confirmarSenha">Confirmar Senha</label>
        <input type="password" id="confirmarSenha" name="confirmar" placeholder="Repita a senha">

        <button type="submit" id="btnCadastrar">Cadastrar</button>
    </form>

    <div id="feedbackCadastro" class="feedback"></div>

    <p class="link-nav">Já tem uma conta? <a href="login.html">Entrar</a></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('nomeDigitado').focus();

    const form     = document.getElementById('formCadastroLogin');
    const btn      = document.getElementById('btnCadastrar');
    const feedback = document.getElementById('feedbackCadastro');

    function validarCampos() {
        const nome      = document.getElementById('nomeDigitado');
        const email     = document.getElementById('emailDigitado');
        const senha     = document.getElementById('senhaDigitada');
        const confirmar = document.getElementById('confirmarSenha');

        [nome, email, senha, confirmar].forEach(el => el.style.boxShadow = '');

        if (nome.value.trim() === '') {
            nome.style.boxShadow = '0 0 5px #ffc107';
            nome.focus();
            return 'Por favor, preencha o campo de nome.';
        }
        if (email.value.trim() === '') {
            email.style.boxShadow = '0 0 5px #ffc107';
            email.focus();
            return 'Por favor, preencha o campo de e-mail.';
        }
        if (senha.value.trim() === '') {
            senha.style.boxShadow = '0 0 5px #ffc107';
            senha.focus();
            return 'Por favor, preencha o campo de senha.';
        }
        if (senha.value.length < 6) {
            senha.style.boxShadow = '0 0 5px #ffc107';
            senha.focus();
            return 'A senha deve ter pelo menos 6 caracteres.';
        }
        if (confirmar.value.trim() === '') {
            confirmar.style.boxShadow = '0 0 5px #ffc107';
            confirmar.focus();
            return 'Por favor, confirme sua senha.';
        }
        if (senha.value !== confirmar.value) {
            confirmar.style.boxShadow = '0 0 5px #ffc107';
            confirmar.focus();
            return 'As senhas não coincidem.';
        }
        return null;
    }

    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        feedback.style.display = 'none';

        const erroLocal = validarCampos();
        if (erroLocal) {
            feedback.className = 'feedback erro';
            feedback.innerHTML = '<span class="icone">⚠️</span>' + erroLocal;
            feedback.style.display = 'block';
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Cadastrando…';

        try {
            const resposta = await fetch('registrar.php', {
                method: 'POST',
                body: new FormData(form)
            });

            const json = await resposta.json();

            if (json.sucesso) {
                feedback.className = 'feedback sucesso';
                feedback.innerHTML =
                    '<span class="icone">✅</span>' +
                    '<strong>' + json.mensagem + '</strong>' +
                    '<br><small class="text-muted">ID do cadastro: #' + json.id + '</small>';
                form.reset();
                document.getElementById('nomeDigitado').focus();
            } else {
                const erros = json.erros
                    ? json.erros.map(e => '<li>' + e + '</li>').join('')
                    : '<li>' + (json.erro || 'Erro desconhecido.') + '</li>';
                feedback.className = 'feedback erro';
                feedback.innerHTML =
                    '<span class="icone">❌</span>' +
                    '<strong>Não foi possível concluir o cadastro:</strong>' +
                    '<ul style="margin:0.4rem 0 0 1rem;padding:0">' + erros + '</ul>';
            }

        } catch (_) {
            feedback.className = 'feedback erro';
            feedback.innerHTML = '<span class="icone">⚠️</span>Falha na comunicação com o servidor.';
        } finally {
            feedback.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Cadastrar';
        }
    });
</script>

</body>
</html>
