<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/cadastro.css">
    <script src="JS/cadastrar.js"></script>
    <title>Cadastro</title>
</head>

<body>

    <div class="formulario">
        <h1>Cadastro</h1>
        <input type="text" id="nomeDigitado" placeholder="Nome" Completo><br>
        <input type="text" id="sobrenomeDigitado" placeholder="Sobrenome" Completo><br>
        <input type="email" id="emailDigitado" placeholder="E-mail" required="true" minlength="5" /><br>
        <input type="password" id="senhaDigitada" placeholder="Senha" required="true" minlength="5" /><br>

        <button input type="submit" id="botao" value="Entrar" onclick="validarFormulario()">Cadastrar</button>

    </div>


    <script src="JS/cadastrar.js"></script>
</body>

</html>
