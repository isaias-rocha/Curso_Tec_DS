<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false, theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark, fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a'
  }
});
const src = `classDiagram
  class Usuario {
    +String id
    +String nome
    +String email
    +String telefone
    +login()
    +editarPerfil()
    +acionarSOS()
  }
  class Localizacao {
    +Float latitude
    +Float longitude
    +DateTime timestamp
    +capturar()
    +atualizar()
  }
  class Alerta {
    +String tipo
    +String status
    +DateTime timestamp
    +enviar()
    +encerrar()
  }
  class ZonaDeRisco {
    +String descricao
    +String nivel
    +Float latitude
    +Float longitude
    +registrar()
  }
  class Mensagem {
    +String conteudo
    +DateTime timestamp
    +enviar()
    +receber()
  }
  class ContatoEmergencia {
    +String nome
    +String telefone
    +adicionar()
    +notificar()
  }
  class HistoricoLocalizacao {
    +List trajeto
    +DateTime dataInicio
    +DateTime dataFim
    +exportar()
  }
  class Circulo {
    +String nome
    +List membros
    +adicionar()
    +remover()
  }
  Usuario "1" --> "0..*" ContatoEmergencia : gerencia
  Usuario "1" --> "0..*" Localizacao : gera
  Usuario "1" --> "1" HistoricoLocalizacao : possui
  Usuario "1" --> "0..*" Alerta : aciona
  Usuario "1" --> "0..*" Mensagem : envia
  Usuario "1" --> "0..*" ZonaDeRisco : denuncia
  Usuario "0..*" -- "0..*" Circulo : integra
  Localizacao --> HistoricoLocalizacao : compoe
  Alerta --> Localizacao : usa
  ZonaDeRisco --> Localizacao : possui`;
try {
  const { svg } = await mermaid.render('cd-svg-id', src);
  document.getElementById('cd-wrap').innerHTML = svg;
  document.querySelectorAll('#cd-wrap svg .node').forEach(n => {
    const fp = n.querySelector('path[d]');
    if (!fp) return;
    const m = fp.getAttribute('d').match(/-?[\d.]+/g)?.map(Number);
    if (!m || m.length < 8) return;
    const xs = [m[0],m[2],m[4],m[6]], ys = [m[1],m[3],m[5],m[7]];
    const x=Math.min(...xs), y=Math.min(...ys), w=Math.max(...xs)-x, h=Math.max(...ys)-y;
    const r = document.createElementNS('http://www.w3.org/2000/svg','rect');
    r.setAttribute('x',x); r.setAttribute('y',y); r.setAttribute('width',w); r.setAttribute('height',h); r.setAttribute('rx','8');
    for(const a of ['fill','stroke','stroke-width','class','style']) if(fp.hasAttribute(a)) r.setAttribute(a, fp.getAttribute(a));
    fp.replaceWith(r);
  });
} catch(e) { document.getElementById('cd-wrap').textContent = 'Erro ao renderizar diagrama.'; }
</script>
<script>
function utab(id, btn) {
  document.querySelectorAll('.utab').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('u-uc').style.display = id === 'uc' ? 'block' : 'none';
  document.getElementById('u-cd').style.display = id === 'cd' ? 'block' : 'none';
}
document.getElementById('u-cd').style.display = 'none';
</script>
